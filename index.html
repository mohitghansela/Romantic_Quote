<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Love ♥</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 1.5s ease;
    }

    /* ── STARS ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star  { position: absolute; border-radius: 50%;
              animation: twinkle var(--dur) ease-in-out infinite var(--delay); }
    @keyframes twinkle {
      0%,100%{ opacity:0; transform:scale(.4); }
      50%    { opacity:.9; transform:scale(1); }
    }

    /* ── FLOATING HEARTS ── */
    .hearts-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .heart-float { position:absolute; bottom:-60px;
                   animation: floatUp var(--dur2) ease-in infinite var(--delay2); }
    @keyframes floatUp {
      0%  { opacity:0; transform:translateY(0) rotate(0deg) scale(.5); }
      10% { opacity:.7; }
      80% { opacity:.3; }
      100%{ opacity:0; transform:translateY(-110vh) rotate(360deg) scale(1.2); }
    }

    /* ── LAYOUT ── */
    .container {
      position:relative; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; gap:26px;
      padding:30px 20px;
      max-width:700px; width:100%;
    }

    /* ── TOP LABEL ── */
    .top-label {
      font-family:'Dancing Script',cursive;
      font-size:clamp(1.1rem,3vw,1.5rem);
      letter-spacing:.1em;
      opacity:0;
      animation:fadeDown 1s ease forwards .3s;
      text-align:center;
    }

    /* ── CARD ── */
    .main-card {
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.18);
      border-top-color:rgba(255,255,255,.35);
      backdrop-filter:blur(22px);
      border-radius:28px;
      padding:clamp(34px,6vw,62px) clamp(28px,7vw,68px);
      width:100%; text-align:center;
      position:relative; overflow:hidden;
      opacity:0;
      animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s;
    }
    @keyframes cardReveal {
      from{ opacity:0; transform:translateY(48px) scale(.93); }
      to  { opacity:1; transform:translateY(0)    scale(1);   }
    }
    .main-card::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 60%);
      pointer-events:none;
    }

    .quote-mark {
      font-family:'Playfair Display',serif;
      font-size:clamp(4.5rem,11vw,7.5rem);
      line-height:.4; display:block;
      margin-bottom:14px; opacity:.18;
    }

    .quote-text {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.2rem,3.2vw,1.9rem);
      font-style:italic; line-height:1.72;
      letter-spacing:.015em;
      position:relative; z-index:1;
      transition:opacity .45s ease, transform .45s ease;
    }

    .divider {
      width:70px; height:2px;
      margin:22px auto; border-radius:2px;
    }

    .quote-author {
      font-family:'Dancing Script',cursive;
      font-size:clamp(.95rem,2.5vw,1.3rem);
      opacity:.82;
    }

    /* ── DAY / DATE ── */
    .day-info {
      display:flex; gap:14px;
      align-items:center; justify-content:center; flex-wrap:wrap;
      opacity:0; animation:fadeUp 1s ease forwards 1.1s;
    }
    .day-badge {
      padding:6px 20px; border-radius:999px;
      border:1px solid currentColor;
      font-size:.8rem; letter-spacing:.14em;
      text-transform:uppercase; font-family:'Lato',sans-serif; font-weight:300;
    }
    .date-text { font-size:.83rem; opacity:.4; letter-spacing:.06em; }

    /* ── BUTTON ── */
    .refresh-btn {
      border:none; cursor:pointer;
      padding:14px 40px; border-radius:999px;
      font-family:'Dancing Script',cursive;
      font-size:1.22rem; color:#fff;
      transition:transform .3s, box-shadow .3s;
      position:relative; overflow:hidden;
      opacity:0; animation:fadeUp 1s ease forwards 1.4s;
    }
    .refresh-btn:hover { transform:scale(1.07); }
    .refresh-btn:active{ transform:scale(.96); }
    .refresh-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
      transform:translateX(-100%); transition:transform .5s;
    }
    .refresh-btn:hover::after{ transform:translateX(100%); }

    .bottom-hearts {
      font-size:1.45rem; letter-spacing:.35em;
      opacity:0; animation:fadeUp 1s ease forwards 1.7s;
    }

    /* ── CARD ANIMATIONS PER DAY ── */
    .anim-pulse  { animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, pulse3d 4s ease-in-out 1.8s infinite !important; }
    .anim-float  { animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, floatCard 5s ease-in-out 1.8s infinite !important; }
    .anim-shimmer{ animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, shimmerCard 6s ease-in-out 1.8s infinite !important; }
    .anim-breathe{ animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, breatheCard 3.5s ease-in-out 1.8s infinite !important; }
    .anim-swing  { animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, swingCard 5s ease-in-out 1.8s infinite !important; transform-origin:top center; }
    .anim-glow   { animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, glowPulse 3s ease-in-out 1.8s infinite !important; }
    .anim-drift  { animation:cardReveal 1.2s cubic-bezier(.22,1,.36,1) forwards .6s, drift 7s ease-in-out 1.8s infinite !important; }

    @keyframes pulse3d    { 0%,100%{transform:scale(1)}                    50%{transform:scale(1.025) rotateY(2deg)} }
    @keyframes floatCard  { 0%,100%{transform:translateY(0) rotate(-.8deg)} 50%{transform:translateY(-18px) rotate(.8deg)} }
    @keyframes shimmerCard{ 0%,100%{transform:perspective(900px) rotateX(0) rotateY(0)} 33%{transform:perspective(900px) rotateX(3deg) rotateY(5deg)} 66%{transform:perspective(900px) rotateX(-2deg) rotateY(-4deg)} }
    @keyframes breatheCard{ 0%,100%{transform:scale(.97)}                  50%{transform:scale(1.03)} }
    @keyframes swingCard  { 0%,100%{transform:rotate(-1.5deg)}             50%{transform:rotate(1.5deg)} }
    @keyframes glowPulse  { 0%,100%{box-shadow:0 0 22px var(--ac),0 0 44px transparent} 50%{box-shadow:0 0 60px var(--ac),0 0 110px var(--ac2),0 0 150px var(--ac3)} }
    @keyframes drift      { 0%,100%{transform:translate(0,0) rotate(0)}    25%{transform:translate(8px,-12px) rotate(1deg)} 75%{transform:translate(-8px,-10px) rotate(-1deg)} }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }

    @media(max-width:480px){ .main-card{padding:26px 18px;} }

    /* ── HEADER ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      padding: 14px 32px;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.1);
      animation: fadeDown 1s ease forwards .1s;
      opacity: 0;
    }
    .header-icon { font-size: 1.5rem; }
    .header-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.3rem, 3.5vw, 1.9rem);
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--ac, #ffb6d9);
      text-shadow: 0 0 18px var(--ac, #ffb6d9);
    }
    .header-subtitle {
      font-family: 'Lato', sans-serif;
      font-size: .72rem;
      font-weight: 300;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: .55;
      margin-top: 2px;
    }
    .header-inner { text-align: center; }

    /* ── FOOTER ── */
    .site-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 24px;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,.1);
      animation: fadeUp 1s ease forwards 1.9s;
      opacity: 0;
    }
    .footer-text {
      font-family: 'Lato', sans-serif;
      font-size: .78rem;
      font-weight: 300;
      letter-spacing: .1em;
      opacity: .65;
    }
    .footer-dev {
      font-family: 'Dancing Script', cursive;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ac, #ffb6d9);
      text-shadow: 0 0 10px var(--ac, #ffb6d9);
    }
    .footer-heart { font-size: .95rem; animation: pulse3d 2s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header" id="siteHeader">
  <span class="header-icon">💖</span>
  <div class="header-inner">
    <div class="header-title">Daily Love</div>
    <div class="header-subtitle">A quote for every heartbeat</div>
  </div>
  <span class="header-icon">💖</span>
</header>

<div class="stars" id="stars"></div>
<div class="hearts-bg" id="heartsContainer"></div>

<div class="container" style="margin-top:72px; margin-bottom:52px;">
  <div class="top-label" id="topLabel">✨ Today's Love ✨</div>

  <div class="main-card" id="mainCard">
    <span class="quote-mark" id="quoteMark">"</span>
    <p class="quote-text" id="quoteText"></p>
    <div class="divider" id="divider"></div>
    <p class="quote-author" id="quoteAuthor"></p>
  </div>

  <div class="day-info">
    <span class="day-badge" id="dayBadge"></span>
    <span class="date-text" id="dateText"></span>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="showNextQuote()">
    💌 New Quote
  </button>

  <div class="bottom-hearts" id="bottomHearts">💕 💗 💕</div>
</div>

<!-- ── FOOTER ── -->
<footer class="site-footer" id="siteFooter">
  <span class="footer-heart">💗</span>
  <span class="footer-text">by the author of</span>
  <span class="footer-dev">'Wish to be like you'</span>
  <span class="footer-heart">💗</span>
</footer>

<script>
// ── THEMES: Pink & Red palette rotating through 7 days ──
const THEMES = [
  { // Sunday — Blush Pink
    day:'Sunday', label:'🌸 Sunday Love 🌸',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(255,182,215,.4) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(255,105,180,.25) 0%,transparent 55%),linear-gradient(135deg,#1a0614 0%,#2e0d22 100%)',
    ac:'#ffb6d9', ac2:'#ff69b4', ac3:'#ffe4f0',
    btn:'linear-gradient(135deg,#ffb6d9,#ff69b4)', shadow:'rgba(255,182,215,.55)',
    anim:'anim-pulse', hearts:['🌸','💕','🌷','💗','🫧'], star:'#ffe4f0'
  },
  { // Monday — Deep Rose
    day:'Monday', label:'🌹 Monday Romance 🌹',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(220,20,60,.35) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(139,0,0,.3) 0%,transparent 55%),linear-gradient(135deg,#1a0005 0%,#300010 100%)',
    ac:'#ff4466', ac2:'#cc1133', ac3:'#ffaab8',
    btn:'linear-gradient(135deg,#ff4466,#cc1133)', shadow:'rgba(220,20,60,.55)',
    anim:'anim-float', hearts:['❤️','🌹','💋','💘','🔴'], star:'#ffaab8'
  },
  { // Tuesday — Hot Pink
    day:'Tuesday', label:'💖 Tuesday Passion 💖',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(255,20,147,.35) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(199,21,133,.25) 0%,transparent 55%),linear-gradient(135deg,#1a0012 0%,#2d001f 100%)',
    ac:'#ff1493', ac2:'#c71585', ac3:'#ffb3e6',
    btn:'linear-gradient(135deg,#ff1493,#c71585)', shadow:'rgba(255,20,147,.55)',
    anim:'anim-shimmer', hearts:['💖','🌺','✨','💓','🩷'], star:'#ffb3e6'
  },
  { // Wednesday — Candy Pink
    day:'Wednesday', label:'🍭 Wednesday Sweetness 🍭',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(255,182,193,.35) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(255,105,180,.25) 0%,transparent 55%),linear-gradient(135deg,#1a0813 0%,#2d1025 100%)',
    ac:'#ffb6c1', ac2:'#ff85a1', ac3:'#fff0f5',
    btn:'linear-gradient(135deg,#ffb6c1,#ff85a1)', shadow:'rgba(255,182,193,.55)',
    anim:'anim-breathe', hearts:['🩷','💕','🍬','🌸','🎀'], star:'#fff0f5'
  },
  { // Thursday — Crimson Red
    day:'Thursday', label:'🔥 Thursday Fire 🔥',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(178,34,34,.4) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(139,0,0,.3) 0%,transparent 55%),linear-gradient(135deg,#120000 0%,#250004 100%)',
    ac:'#e83a3a', ac2:'#b22222', ac3:'#ffcdd2',
    btn:'linear-gradient(135deg,#e83a3a,#b22222)', shadow:'rgba(178,34,34,.55)',
    anim:'anim-swing', hearts:['❤️‍🔥','🔥','❤️','💪','🌹'], star:'#ffcdd2'
  },
  { // Friday — Rose Red
    day:'Friday', label:'🌹 Friday Romance 🌹',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(255,77,109,.38) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(201,24,74,.25) 0%,transparent 55%),linear-gradient(135deg,#1a0008 0%,#2d0015 100%)',
    ac:'#ff4d6d', ac2:'#c9184a', ac3:'#ffb3c1',
    btn:'linear-gradient(135deg,#ff4d6d,#c9184a)', shadow:'rgba(255,77,109,.55)',
    anim:'anim-glow', hearts:['❤️','🌹','💋','💝','💘'], star:'#ffb3c1'
  },
  { // Saturday — Fuchsia Pink
    day:'Saturday', label:'💜 Saturday Magic 💜',
    bg:'radial-gradient(ellipse at 25% 25%,rgba(255,0,127,.32) 0%,transparent 55%),radial-gradient(ellipse at 75% 75%,rgba(200,0,100,.22) 0%,transparent 55%),linear-gradient(135deg,#14001a 0%,#240028 100%)',
    ac:'#ff007f', ac2:'#cc0066', ac3:'#ffb3d9',
    btn:'linear-gradient(135deg,#ff007f,#cc0066)', shadow:'rgba(255,0,127,.55)',
    anim:'anim-drift', hearts:['💗','🌸','💫','🩷','🌺'], star:'#ffb3d9'
  },
];

// ── QUOTES: 7 per day, all English ──
const QUOTES = [
  [ // Sunday
    {q:"Love is not something you find. Love is something that finds you.",           a:"— Loretta Young"},
    {q:"The best thing to hold onto in life is each other.",                          a:"— Audrey Hepburn"},
    {q:"Every love story is beautiful, but ours is my favorite.",                    a:"— Unknown"},
    {q:"In your arms is right where I want to be, where I'll always stay.",          a:"— Unknown"},
    {q:"You are my sun, my moon, and all of my stars.",                              a:"— E.E. Cummings"},
    {q:"To love and be loved is to feel the sun from both sides.",                   a:"— David Viscott"},
    {q:"You make my heart smile in a way nothing else ever could.",                  a:"— Unknown"},
  ],
  [ // Monday
    {q:"I love you — not only for what you are, but for what I am when I'm with you.", a:"— Roy Croft"},
    {q:"You are my today and all of my tomorrows.",                                  a:"— Leo Christopher"},
    {q:"Whatever our souls are made of, his and mine are the same.",                 a:"— Emily Brontë"},
    {q:"I would rather spend one lifetime with you than face all the ages alone.",   a:"— J.R.R. Tolkien"},
    {q:"Meeting you was fate. Falling for you was out of my control.",               a:"— Unknown"},
    {q:"A day without you is a day I never want to live again.",                     a:"— Unknown"},
    {q:"My favorite place in the world is right next to you.",                       a:"— Unknown"},
  ],
  [ // Tuesday
    {q:"You are the finest, loveliest, tenderest, and most beautiful person I have ever known.", a:"— F. Scott Fitzgerald"},
    {q:"If I know what love is, it is because of you.",                              a:"— Hermann Hesse"},
    {q:"I am who I am because of you. You are every reason, every hope.",            a:"— Nicholas Sparks"},
    {q:"The heart wants what it wants — and mine wants only you.",                   a:"— Unknown"},
    {q:"Loving you is like breathing — how can I stop?",                             a:"— Unknown"},
    {q:"You had me at hello.",                                                       a:"— Jerry Maguire"},
    {q:"I've fallen in love many times — always with you.",                          a:"— Unknown"},
  ],
  [ // Wednesday
    {q:"Distance means so little when someone means so much.",                       a:"— Unknown"},
    {q:"I look at you and see the rest of my life in front of my eyes.",             a:"— Unknown"},
    {q:"You are the last thought in my mind before I drift off to sleep.",           a:"— Unknown"},
    {q:"Love is being stupid together.",                                             a:"— Paul Valery"},
    {q:"In all the world, there is no heart for me like yours.",                     a:"— Maya Angelou"},
    {q:"I love you more than I have ever found a way to say to you.",                a:"— Ben Folds"},
    {q:"You are the answer to every prayer I've offered.",                           a:"— Nicholas Sparks"},
  ],
  [ // Thursday
    {q:"Grow old along with me; the best is yet to be.",                             a:"— Robert Browning"},
    {q:"I swear I couldn't love you more than I do right now, and yet I know I will.", a:"— Nicholas Sparks"},
    {q:"The real lover is the man who can thrill you by just touching your hand.",   a:"— Barbara Cartland"},
    {q:"Love is composed of a single soul inhabiting two bodies.",                   a:"— Aristotle"},
    {q:"Take my hand, take my whole life too — I can't help falling in love with you.", a:"— Elvis Presley"},
    {q:"My heart is and always will be yours.",                                      a:"— Jane Austen"},
    {q:"True love stories never have endings.",                                      a:"— Richard Bach"},
  ],
  [ // Friday
    {q:"You are my heart, my life, my one and only thought.",                        a:"— Arthur Conan Doyle"},
    {q:"I love you not because of who you are, but because of who I am with you.",  a:"— Unknown"},
    {q:"I want all of you, forever, you and me — every day.",                        a:"— Nicholas Sparks"},
    {q:"When I saw you I fell in love, and you smiled because you knew.",            a:"— William Shakespeare"},
    {q:"Wherever you are, whatever you do, be in love.",                             a:"— Rumi"},
    {q:"I need you like a heart needs a beat.",                                      a:"— Unknown"},
    {q:"If you live to be a hundred, I want to live to be a hundred minus one day.", a:"— A.A. Milne"},
  ],
  [ // Saturday
    {q:"Love is a friendship set on fire.",                                          a:"— Jeremy Taylor"},
    {q:"You don't love someone for their looks or their clothes or their car. You love them because they sing a song only you can hear.", a:"— Oscar Wilde"},
    {q:"I love you and that's the beginning and end of everything.",                 a:"— F. Scott Fitzgerald"},
    {q:"She is the finest, loveliest thing I have ever seen in this world.",         a:"— F. Scott Fitzgerald"},
    {q:"I choose you. And I'll choose you over and over and over.",                  a:"— Unknown"},
    {q:"You are my paradise and I would happily get lost in you forever.",           a:"— Haiku"},
    {q:"Love is not about how many days, months or years you have been together. It's all about how much you love each other every single day.", a:"— Unknown"},
  ],
];

// ── INIT ──
const today  = new Date();
const di     = today.getDay();
const T      = THEMES[di];
const quotes = QUOTES[di];
let   qi     = today.getDate() % quotes.length;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// CSS vars
document.documentElement.style.setProperty('--ac',  T.ac);
document.documentElement.style.setProperty('--ac2', T.ac2);
document.documentElement.style.setProperty('--ac3', T.ac3);

// Background
document.body.style.background = T.bg;

// Labels / colours
document.getElementById('topLabel').style.color     = T.ac;
document.getElementById('topLabel').textContent     = T.label;
document.getElementById('quoteMark').style.color    = T.ac;
document.getElementById('divider').style.background = `linear-gradient(90deg,transparent,${T.ac},transparent)`;
document.getElementById('quoteAuthor').style.color  = T.ac3;
document.getElementById('dayBadge').style.color     = T.ac;
document.getElementById('dayBadge').style.borderColor = T.ac;
document.getElementById('dayBadge').textContent     = T.day;
document.getElementById('dateText').textContent     = `${today.getDate()} ${MONTHS[today.getMonth()]} ${today.getFullYear()}`;
document.getElementById('bottomHearts').style.color = T.ac;

const btn = document.getElementById('refreshBtn');
btn.style.background = T.btn;
btn.style.boxShadow  = `0 4px 28px ${T.shadow}`;

document.getElementById('mainCard').classList.add(T.anim);

// Update header & footer accent colors
document.getElementById('siteHeader').querySelector('.header-title').style.color = T.ac;
document.getElementById('siteHeader').querySelector('.header-title').style.textShadow = `0 0 18px ${T.ac}`;
document.getElementById('siteFooter').querySelector('.footer-dev').style.color = T.ac;
document.getElementById('siteFooter').querySelector('.footer-dev').style.textShadow = `0 0 10px ${T.ac}`;

// ── QUOTE DISPLAY ──
function renderQuote(idx) {
  const qEl = document.getElementById('quoteText');
  const aEl = document.getElementById('quoteAuthor');
  qEl.style.opacity   = '0';
  qEl.style.transform = 'translateY(-10px)';
  setTimeout(() => {
    qEl.textContent = quotes[idx].q;
    aEl.textContent = quotes[idx].a;
    qEl.style.opacity   = '1';
    qEl.style.transform = 'translateY(0)';
  }, 420);
}
renderQuote(qi);

function showNextQuote() {
  qi = (qi + 1) % quotes.length;
  renderQuote(qi);
}

// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 70; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 3 + 1;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${T.star};--dur:${2+Math.random()*4}s;--delay:${Math.random()*6}s;`;
  starsEl.appendChild(s);
}

// ── FLOATING HEARTS ──
const heartsEl = document.getElementById('heartsContainer');
for (let i = 0; i < 22; i++) {
  const h = document.createElement('div');
  h.className    = 'heart-float';
  h.textContent  = T.hearts[Math.floor(Math.random() * T.hearts.length)];
  const sz = 14 + Math.random() * 22;
  h.style.cssText = `left:${Math.random()*100}%;font-size:${sz}px;--dur2:${7+Math.random()*9}s;--delay2:${Math.random()*12}s;`;
  heartsEl.appendChild(h);
}
</script>
</body>
</html>
